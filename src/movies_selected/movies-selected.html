<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CineMate App</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <!-- Mobile first-->
    <link rel="stylesheet" href="../public/css/responsive.css" />
    <!-- Larger devices-->
    <link rel="stylesheet" href="../public/css/style.css" />
    <!-- Larger devices -->
    <script type="module" src="../js/TrailerPage.js" defer></script>
  </head>

  <body>
    <!-- Header -->
    <header>
      <div>
        <h1>CineMate | Home</h1>
      </div>
      <div>
        <!-- Search Section -->
        <section id="search-section">
          <p>Search for movies below:</p>
          <input type="text" id="search-input" placeholder="Enter movie title..." />
          <button id="search-btn">Search</button>
        </section>
    
        <div id="filter-results">
          <button id="filter-btn"><img src="" alt="A svg icon of filter"> Filters</button>
        </div>
      </div>
    
    </header>

    <!-- Results Section -->
    <main id="results">
      <div id="movie-details"></div>
    </main>

    <!-- Footer -->
    <footer>
      <p>
        &copy; 2026 | CineMate App. All rights reserved. | Last Modified :
        <span id="lastModified"></span>
      </p>
      <div class="socials">
        <a href="https://www.facebook.com/kevin.mbemba.208794" target="_blank">
          <img src="" alt="Facebook icon" width="60" height="60" />
        </a>

        <a href="https://github.com/snipercoder96" target="_blank">
          <img src="" alt="GitHub icon" width="60" height="60" />
        </a>

        <a
          href="https://www.linkedin.com/in/summer-soldiertm-4a49502b6"
          target="_blank"
        >
          <img src="" alt="LinkedIn icon" width="60" height="60" />
        </a>
      </div>
    </footer>
  </body>
</html>

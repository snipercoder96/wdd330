<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Outer circle (film reel) -->
  <circle cx="32" cy="32" r="30" stroke="#2C3E50" stroke-width="4" fill="#34495E"/>
  
  <!-- Inner film reel holes -->
  <circle cx="20" cy="20" r="4" fill="#ECF0F1"/>
  <circle cx="44" cy="20" r="4" fill="#ECF0F1"/>
  <circle cx="20" cy="44" r="4" fill="#ECF0F1"/>
  <circle cx="44" cy="44" r="4" fill="#ECF0F1"/>
  
  <!-- Play button -->
  <polygon points="26,20 26,44 46,32" fill="#E74C3C"/>
</svg>
